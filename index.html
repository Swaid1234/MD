<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المشاعر الرقمية - حج 1447هـ</title>
    <style>
        /* الخطوط وتصفير الإعدادات */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* الخلفية العامة للموقع */
        body {
            background-image: url('https://images.unsplash.com/photo-1565552645632-d725f8bfc19a?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #060709;
        }

        /* طبقة الـ Blur والظلام الفاخر للخلفية العامة */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(6, 7, 9, 0.4) 0%, rgba(6, 7, 9, 0.85) 100%);
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            z-index: 1;
        }

        /* حاوية التصميم المستقبلية الفاخرة (The Main Card) */
        .container {
            position: relative;
            z-index: 2;
            background: rgba(13, 17, 23, 0.65); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.85), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 420px;
            width: 92%;
            overflow: hidden; /* لمنع خروج عناصر الصورة عن انحناء المربع */
            animation: superFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* الحاوية الداخلية للمحتوى لإضافة مسافات مريحة */
        .card-content {
            padding: 40px 30px 50px 30px;
        }

        /* تصميم قسم الصورة المدمجة داخل المربع */
        .featured-image-holder {
            position: relative;
            width: 100%;
            height: 160px;
            background-image: url('https://images.unsplash.com/photo-1565552645632-d725f8bfc19a?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* تظليل ناعم فوق الصورة الداخلية لإبراز الشعار */
        .featured-image-holder::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; right: 0; top: 0;
            background: linear-gradient(to bottom, rgba(13, 17, 23, 0.1) 0%, rgba(13, 17, 23, 0.7) 100%);
        }

        /* شعار السنة الهجرية الفخم العائم فوق الصورة */
        .hajj-badge {
            position: absolute;
            bottom: 15px;
            right: 20px;
            z-index: 3;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #d4af37; 
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        h2 {
            color: #ffffff;
            margin-bottom: 12px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #bdc3c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* إعدادات الصفحات والتنقل */
        #page-1 { display: block; }
        #page-2 { display: none; }

        .fade-active {
            animation: pageTransition 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .btn-vertical, .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .btn-group {
            flex-direction: row;
        }

        /* الأزرار الفاخرة */
        .btn {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 18px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        /* توهج أزرار المشاعر المقدسة */
        .btn-arfa:hover { 
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            border-color: #00b4d8;
            box-shadow: 0 15px 30px rgba(0, 180, 216, 0.35);
        }

        .btn-mina:hover { 
            background: linear-gradient(135deg, #7209b7, #560bad);
            border-color: #7209b7;
            box-shadow: 0 15px 30px rgba(114, 9, 183, 0.35);
        }
        
        /* تدرج النيون لأزرار الحضور والانصراف الرقمية */
        .btn-attendance { 
            background: linear-gradient(135deg, rgba(17, 153, 142, 0.15), rgba(56, 239, 125, 0.15)); 
            border: 1px solid rgba(56, 239, 125, 0.4);
            color: #38ef7d;
            flex: 1; 
        }
        .btn-attendance:hover { 
            background: linear-gradient(135deg, #11998e, #38ef7d); 
            color: #ffffff;
            box-shadow: 0 15px 30px rgba(56, 239, 125, 0.3);
        }

        .btn-departure { 
            background: linear-gradient(135deg, rgba(234, 141, 141, 0.15), rgba(187, 62, 3, 0.15)); 
            border: 1px solid rgba(234, 141, 141, 0.4);
            color: #ea8d8d;
            flex: 1; 
        }
        .btn-departure:hover { 
            background: linear-gradient(135deg, #ea8d8d, #bb3e03); 
            color: #ffffff;
            box-shadow: 0 15px 30px rgba(234, 141, 141, 0.3);
        }

        /* زر العودة الشفاف */
        .btn-back {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 35px;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: color 0.3s ease;
            cursor: pointer;
        }
        .btn-back:hover {
            color: #ffffff;
        }

        /* رسائل الحالة المتوهجة */
        #status-message {
            margin-top: 25px;
            font-size: 14px;
            min-height: 24px;
        }
        
        .error-text { 
            color: #ff4d4d !important; 
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
            animation: shake 0.4s ease-in-out; 
        }
        
        .loading-text { 
            color: #00b4d8 !important; 
            text-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
        }
        
        /* شارة النطاق الجغرافي النشط */
        .location-badge {
            display: inline-block;
            background: rgba(0, 180, 216, 0.08);
            color: #00b4d8;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 13px;
            margin-bottom: 25px;
            font-weight: 700;
            border: 1px solid rgba(0, 180, 216, 0.25);
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.1);
        }

        /* منحنيات الحركات */
        @keyframes superFadeIn {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes pageTransition {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الجزء العلوي: قسم الصورة المدمجة داخل المربع الفاخر -->
    <div class="featured-image-holder">
        <div class="hajj-badge">المشاعر المقدسة ١٤٤٧هـ</div>
    </div>
    
    <!-- الحاوية الداخلية لعناصر الصفحات والتحكم -->
    <div class="card-content">
        
        <!-- ================= الصفحة الأولى: اختيار المشعر الجغرافي ================= -->
        <div id="page-1" class="fade-active">
            <h2>بوابة التحقق الذكي</h2>
            <p>مرحباً بك في المنظومة الرقمية للحج، يرجى اختيار مشعر تواجدك الحالي لبدء مطابقة الإحداثيات:</p>
            
            <div class="btn-vertical">
                <button class="btn btn-arfa" onclick="selectLocation(0)">مَشعر عرفات</button>
                <button class="btn btn-mina" onclick="selectLocation(1)">مَشعر مِنى</button>
            </div>
            <div id="status-message"></div>
        </div>

        <!-- ================= الصفحة الثانية: الحضور والانصراف الرقمي ================= -->
        <div id="page-2">
            <h2>بوابة التحضير الرقمية</h2>
            <div id="active-location" class="location-badge"></div>
            <p>تم إثبات هويتك المكانية بنجاح عبر الأقمار الصناعية، يرجى تسجيل الإجراء المطلوب:</p>
            
            <div class="btn-group">
                <button class="btn btn-attendance" onclick="redirectToForm('attendance')">إثبات حضور</button>
                <button class="btn btn-departure" onclick="redirectToForm('departure')">إثبات انصراف</button>
            </div>

            <button class="btn btn-back" onclick="goBack()">← العودة لتغيير الموقع</button>
        </div>

    </div>
</div>

<script>
  // ========================================================
    // 1. إعدادات الإحداثيات اليدوية (عرفة ومنى)
    // ========================================================
    const LOCATIONS = [
        { name: "مشعر عرفة", lat: 21.338251, lng:39.994099 }, 
        { name: "مشعر منى", lat: 21.41619632962374, lng:39.88574198075799 }   
    ];

    const ALLOWED_RADIUS = 50000000; // النطاق المسموح بالمتر

    // ========================================================
    // 2. روابط قوقل فورم
    // ========================================================
    const ATTENDANCE_FORM_URL = "https://forms.gle/6pUtD5bcLRYJV18Z8";
    const DEPARTURE_FORM_URL = "https://forms.gle/Hn2ysDaE5TP6pwn17";
    // ========================================================

    const statusDiv = document.getElementById('status-message');
    const page1 = document.getElementById('page-1');
    const page2 = document.getElementById('page-2');
    const activeLocationBadge = document.getElementById('active-location');

    function selectLocation(index) {
        const targetLocation = LOCATIONS[index];

        if (!navigator.geolocation) {
            statusDiv.className = "error-text";
            statusDiv.innerHTML = "النظام لا يدعم ميزة تحديد الموقع الجغرافي.";
            return;
        }

        statusDiv.className = "loading-text";
        statusDiv.innerHTML = `جاري استدعاء القمر الصناعي لمطابقة [${targetLocation.name}]...`;

        navigator.geolocation.getCurrentPosition(
            function(position) {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;

                const distance = calculateDistance(userLat, userLng, targetLocation.lat, targetLocation.lng);

                if (distance <= ALLOWED_RADIUS) {
                    statusDiv.innerHTML = "";
                    
                    page1.style.display = "none";
                    page2.style.display = "block";
                    page2.classList.add("fade-active"); 
                    
                    activeLocationBadge.innerHTML = `📍 النطاق النشط: ${targetLocation.name}`;
                } else {
                    statusDiv.className = "error-text";
                    statusDiv.innerHTML = `عذراً، نظام التحقق يؤكد عدم تواجدك حالياً في ${targetLocation.name}.`;
                }
            },
            function(error) {
                statusDiv.className = "error-text";
                if (error.code === error.PERMISSION_DENIED) {
                    statusDiv.innerHTML = "يرجى منح المتصفح صلاحية الـ GPS لإتمام الفحص.";
                } else {
                    statusDiv.innerHTML = "تعذر الاتصال بـ GPS، يرجى تفعيل خدمة الموقع في الهاتف.";
                }
            },
            {
                enableHighAccuracy: true,
                timeout: 12000,
                maximumAge: 0
            }
        );
    }

    function goBack() {
        page2.style.display = "none";
        page2.classList.remove("fade-active");
        
        page1.style.display = "block";
        page1.classList.add("fade-active");
        
        statusDiv.innerHTML = "";
        statusDiv.className = "";
    }

    function redirectToForm(action) {
        if (action === 'attendance') {
            window.location.replace(ATTENDANCE_FORM_URL);
        } else if (action === 'departure') {
            window.location.replace(DEPARTURE_FORM_URL);
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c; 
    }
</script>

</body>
</html>
